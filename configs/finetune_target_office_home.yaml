seed: 42

run:
  root_dir: runs

data:
  dataset_name: office_home
  root: /home/ljzhang/data/sfada/office-home
  source_domain: Art
  target_domain: Clipart
  num_classes: 65
  image_size: 224

model:
  backbone: resnet50
  pretrained: true
  bottleneck_dim: 256
  bottleneck_relu: true
  lora:
    enabled: true
    r: 8
    rank_schedule:
      layer1: 16
      layer2: 8
      layer3: 4
      layer4: 2
    alpha: 16
    dropout: 0.0
    target_modules:
      - layer1.*.conv1
      - layer1.*.conv2
      - layer1.*.conv3
      - layer2.*.conv1
      - layer2.*.conv2
      - layer2.*.conv3
      - layer3.*.conv1
      - layer3.*.conv2
      - layer3.*.conv3
      - layer4.*.conv1
      - layer4.*.conv2
      - layer4.*.conv3

train:
  epochs: 5
  batch_size: 64
  num_workers: 4
  lr: 0.001
  weight_decay: 0.0005
  use_scheduler: false
  finetune_mode: lora_finetune

eval:
  batch_size: 128
  num_workers: 4
  monitor_source_val: true
