seed: 42

run:
  root_dir: runs

data:
  dataset_name: office_home
  root: /home/ljzhang/data/sfada/office-home
  source_domain: Art
  target_domain: Clipart
  num_classes: 65
  image_size: 224

model:
  # Which source checkpoint to initialize round 0 from: best | last
  source_ckpt: best
  backbone: resnet50
  pretrained: true
  bottleneck_dim: 256
  bottleneck_relu: true
  lora:
    enabled: true
    r: 8
    rank_schedule:
      layer1: 16
      layer2: 8
      layer3: 4
      layer4: 2
    alpha: 16
    dropout: 0.0
    target_modules:
      - layer1.*.conv1
      - layer1.*.conv2
      - layer1.*.conv3
      - layer2.*.conv1
      - layer2.*.conv2
      - layer2.*.conv3
      - layer3.*.conv1
      - layer3.*.conv2
      - layer3.*.conv3
      - layer4.*.conv1
      - layer4.*.conv2
      - layer4.*.conv3

train:
  epochs: 5
  batch_size: 64
  num_workers: 4
  # If > 0, write per-iter loss every N steps to train_log.jsonl.
  log_every_iters: 50
  lr: 0.0001
  weight_decay: 0.0005
  use_scheduler: false
  finetune_mode: lora_finetune

eval:
  batch_size: 128
  num_workers: 4
  monitor_source_val: true

method:
  # Optional experiment name for run directory naming.
  # If empty, a tag is auto-built from method switches (random/margin/change/debias/pseudo/budget).
  exp_name: ""
  # Number of active adaptation rounds.
  num_rounds: 10
  # Finetune epochs per round on (labeled + pseudo) loaders.
  round_epochs: 1
  # Total oracle labeling budget over all rounds.
  # int: absolute count, float in (0,1]: ratio of |target_adapt| (e.g., 0.1 -> 10%).
  budget_total: 0.1
  # If true, selection scores are random (ignores margin/change and disables pseudo branch).
  random_pick: false

  # Query scoring: uncertainty (margin) + temporal change.
  score_use_margin: true
  score_use_change: true
  w_margin: 0.5
  w_change: 0.5

  # Prior estimation / debias.
  use_debias: true
  debias_lambda: 1.0
  prior_momentum: 0.9

  # Pseudo branch.
  use_pseudo: true
  pseudo_keep_ratio: 0.5
  # Total loss = CE_labeled + pseudo_loss_weight * CE/AML_pseudo
  pseudo_loss_weight: 1.0
  # AML shift: Delta_j = aml_lambda * log(1 / h_j).
  aml_lambda: 1.0 # might be the same as debias_lambda
