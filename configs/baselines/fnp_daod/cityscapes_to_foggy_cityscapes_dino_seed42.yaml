seed: 42

run:
  root_dir: runs

data:
  root: /home/ljzhang/data/ins-seg/cityscapes
  source_domain: cityscapes
  target_domain: foggy_cityscapes
  foggy_beta: "0.02"
  num_classes: 8

detector:
  model_name: dino_r50_4scale_12ep
  checkpoint_name: dino_r50_4scale_12ep_49_2AP.pth
  source_ckpt: final
  min_size_test: 800
  max_size_test: 1333

method:
  exp_name: fnp_daod_cityscapes_to_foggy_cityscapes_dino_seed42
  num_rounds: 2
  round_epochs: 1
  budget_total: 0.05

  initial_adaptation:
    enabled: false
    epochs: 1
    use_pseudo_labels: false

  fnpm:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1
    lr: 0.0001
    weight_decay: 0.0001
    batch_size: 16
    epochs: 1
    num_workers: 0
    target_cap: 10.0
    match_iou_thresh: 0.5
    max_source_samples: 0
    max_labeled_target_samples: 0

  acquisition:
    mc_dropout_passes: 4
    mc_dropout_passes_train: 2
    dropout_rate: 0.1
    score_floor: 0.05
    max_queries: 300
    max_target_samples: 0

  discriminator:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.1
    lr: 0.0001
    weight_decay: 0.0001
    epochs: 1
    batch_size: 64
    feature_batch_size: 1
    num_workers: 0

  pseudo:
    score_floor: 0.05
    score_min: 0.3
    loc_var_max: 0.1
    dedup_iou_thresh: 0.7

  train:
    lr: 0.0001
    weight_decay: 0.0001
    num_workers: 0
    teacher_device: auto
    source_batch_size: 1
    labeled_batch_size: 1
    unlabeled_batch_size: 1
    ema_momentum: 0.999
    lambda_adv: 0.01
    grl_lambda: 1.0
    pseudo_weight: 1.0
    use_pseudo_labels: true
    max_steps_per_epoch: 0
    max_source_samples: 0
    max_target_samples: 0

  eval:
    source_val_limit: 0
    target_val_limit: 0
